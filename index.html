<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<div class="container">

    <h1>Music Player</h1>

    <!-- Search -->

    <input
    type="text"
    id="searchInput"
    placeholder="Search Songs...">

    <!-- Categories -->

    <div class="categories">

        <button class="category-btn">All</button>

        <button class="category-btn">Pop</button>

        <button class="category-btn">Naat</button>

        <button class="category-btn">Motivational</button>

    </div>

    <!-- Player -->

    <div class="player">

        <img
        id="cover"
        src="./assets/images/cover.png"
        alt="cover">

        <h2 id="songTitle">
            Select a Song
        </h2>

        <audio id="audio"></audio>

        <div class="controls">

            <button id="prevBtn">

                <i class="fa-solid fa-backward"></i>

            </button>

            <button id="playBtn">

                <i class="fa-solid fa-play"></i>

            </button>

            <button id="nextBtn">

                <i class="fa-solid fa-forward"></i>

            </button>

        </div>

        <div class="volume">

            <i class="fa-solid fa-volume-high"></i>

            <input
            type="range"
            id="volume"
            min="0"
            max="1"
            step="0.1"
            value="1">

        </div>

    </div>

    <!-- Playlist -->

    <div class="playlist">

        <h3>Playlist</h3>

        <ul id="playlist"></ul>

    </div>

</div>

<script src="app.js"></script>

</body>
</html>
